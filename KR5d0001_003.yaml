body:
  text: 天地山澤部天地定位陰陽分離圖書出數支干紀時八卦成立九宫相隨悔吝有兆存亡預知干名遁甲支曰六壬一虧一盈變化高低獨用六壬星門干缺如用遁甲神殺支虧支干不備吉凶奚為深慮後世無能廣規止以先鋒言識情微次將統體罔察興衰末於盡勢決其安危神將休旺仍辨尊卑造化強弱吉凶可期此乃皮膚不盡根蒂天地樞機有道可窺總曰壬遁察見毫釐聰明賢哲故能一之欲為萬事首出三奇先鋒助之各有其宜旺相在門喜氣怡怡權利兩遂行逢欣嬉日祿在門君子提携酒食財穀動靜歡歸日馬在門圖幹碌碌公私失望返覆奔馳日合在門陰人助力陰謀成就貴人相依若逢惡將未免生疑日破在門口舌難會結交喪約口許心違日劫在門盜賊失脫爭官難理財化塵飛日鬼在門病者難醫若謀他事是反成非日墓在門水陸傾危尤防血光蔽翳徘徊空亡在門不宜主事反招謗訕鬨鬨虛雷天乙在門貴人應之行逢良善長者趍陪螣蛇在門怪異驚嚇若值風雨中道空回若聞鴉鳴追捕交加朱雀在門紅物前奢聞得樂音或見圖畫小有口舌事謀有差六合在門車馬鬧聞陰人聚歡彩色衣華青龍在門財氣重加道逢吏人或見奇花勾陳在門人物爭鬭百難相逐天空在門賤物擁道多有成敗穢語喧譁白虎在門疊見官非聞悲見死轎馬兵車太常在門見聞異事巧繪神玄武在門陰雲黯黯驚惶亡失雨橫風斜太陰在門賢婦異常小求大得老婦進茶天后在門弱而得就嬰童戲嬉女子還家奇門先兆應之無差立春之日厥時至良歲中休否可得尋詳直符布位直事分鄉天干為使循落何方開門定水怕逢玄武從魁相附幹月滔洋神后白虎四時茫茫驚門定賊太沖蛇武劫殺日鬼盜賊猖狂天空太乙攪擾四方傳送朱雀聲勢揚揚加之日墓萬姓惶惶如見勾神賊自潛藏不宜白虎雄勇難當太平氣象門立大常景門定火勝光太乙螣蛇朱雀斯為火殃不宜太沖功曹來傍傳送六合刑害相傷次分分野丁丙之鄉月厭同住火燭隄防死門主災不可來巽大吉小吉風災不祥功曹青龍春多霖雨太乙朱雀夏熱炎長傳送太陰秋多寒涼登明天后冬極嚴霜勝光螣蛇人染瘟黃天剛白虎百物相傷從魁勾陳嵐瘴村坊天剛從魁六庚加己壬癸太乙震動山岡休門主雨風神白虎更有青龍逐節而取以干納支大吉加祥太沖神后河魁從魁四神下辰主之降雨日馬逢龍必生水苦雨中發風必有白虎米麥司神傷門與生三奇之下與祿為鄉太常豐稔功曹歲亨貴人在治斗米百文后合鬼神旱天有方考之杜門魁罡蛇虎不可同存太沖下若同火將火神同名加之月厭五穀難成天火地焦太常入墓門門迫刑絲蠶布帛寸尺休論太歲作加之神后水出山崩勾陳在上國祚安寧水火風雷部風雷相薄有疾有遲雷初發聲起於四維申子辰歲坤宫震威寅午戌歲艮宫徘徊亥卯未歲乾宫動機巳酉丑歲巽宫轟雷百里不同支干不推欲知分野歲月日時甲蠻乙海外及東夷丙楚丁岱江淮南離戊己韓衛中洲河濟庚秦辛華西國為先壬燕趙魏癸常山期子為周野丑魏遼東寅為趙楚卯鄭申齊辰晉邯鄲巳衛午秦未梁宋國酉魯趙戌吳越為塞亥為燕媒直使臨坤天禽直時太沖白虎青龍坤維不暴則霪不風則雷申宫見鬼雹起無疑天沖一星主之轟雷落於乾巽從魁從此如逢朱雀螣蛇相依傷門掣電山嶽崩頽玄武太陰斗明星迷大吉小吉勾陳天后陰雲立散長天虹霓或為日馬密雲不雨如得日祿瑞雪霏霏天蓬乙星冰雪霜期后陰玄武亥子從魁立降大雪飄蕩瓊瑰如臨朱雀紛紛揚灰加以風泊霜鋪結堆雨師同位雪雨微微天剛勝光或為日破直事入巽雪重聲雷地氣先泄陽氣潛衰天蓬在震六合亦震五雷為使法主大雪一月無暉天英一星火賊主之丙庚相加歲月日時太乙朱雀螣蛇日鬼百里然煨符孛時孛火星所夏同玄武秋冬勾陳五使入離魁罡為輔炎炎天柱一星位司水府若居坎宫后陰龍虎天剛河魁漂流四方滔滔無阻或入空亡不然刑害禾苗蕩盡移山湧土太乙為合登明貴人神將旺相多生雲雨劫殺隱中山魈水蠱預明陰晦節氣觀天格則對沖玄武當先次其白虎劫殺同漂登明從魁刑害來前霖霖一氣發用循傳九皇忌日天道分明如逢黑道不雨則陰甲午戊午乙酉己酉丁巳癸巳壬寅辛丑陰靄無移以定凶咎風角之占玄妙堪傳巽宫屬木木音角焉星曰天輔杜門之先甲午甲辰風神廟位青龍白虎馮夷之源鼓舞萬物出為號令六情之别巽主風煙立春之日天任用事條風徐來斯即和氣衝風為逆兵起賊隊天氣無雲朗然晴霽歲善而熟禾苗為最陰則旱傷蟲蝗為祟禾豆損傷米麥湧貴風從乾來霜傷百物粟貴民飢災鍾士卒風從坎來冬大寒哉北夷侵掠戰擒渠魁風從艮來百物俱通五穀成熟是為歲豐風從震來地氣迸泄百物不成人憂神悅風從巽來杜門多凶足生蟲物蔬菜無功風從離來旱傷苗稼生物損人小人雄霸風從坤來春多寒涼六月水災土工興孽風從兊來兵起愁悴百物難生霜旱為戾春分之日天沖主之青雲東來歲事無飢昏寒多凶晴明不中明庶風襲斯為歲豐風從乾來金鐵倍貴人事不通風從坎來久客飢疫菽麥風從艮來夏多不熟人有小飢來加一倍風從歲中安吉四海塵清風從巽來蟲生於野四月風從離來五月先水後旱有災人多祀鬼風從坤來人多疾病小有水災後却安吉風從兊來風寒有兵八月人憂國有虛驚立夏之日天輔司巽南方赤雲歲豐無病晴明無雲衝風旱證風從乾來夏霜歲飢麥先不登人死多悲風從坎來多生風雨魚行人道四方愁苦風從艮來山崩地動人疫天災老小喪命風從震來雷起非時擊傷人物斯神主之風從巽來年豐國安四方清肅八表儀端風從離來夏旱禾焦人民憔悴國邑焚燒風從坤來人多不安萬物夭沃地不曾乾風從兊來蝗蟲大動飢饉之災難逃米空夏至之日天英主之景風來吉沖之則凶南方赤氣國安民豐晴明則旱水竭山崩風從乾來寒傷萬物兵災水潦秋冬汨沒風從坎來四時不節夏內多寒人傷見血風從艮來山水暴湧人民之災墳添新冢風從震來多疫妖孽癘不離門應于八月風從巽來九月主風摧落萬物民不聊生風從離來五穀成熟秋氣肅清倍生花木風從坤來六月雨儔立秋將近水湧橫流立秋之日天內主之涼風徐徐人民伸舒逆風沖來穀無實驅白雲小吉歲有良餘晴明不利物有風從乾來苦寒多雨若近冬天風寒霜邇風從四野紛紛高低離别風從艮來米穀倍收風從巽來卒兵內起風不倣徨身可止風從兵戈不利冬至即昌風從坤來五穀成熟人風從兊來兵起塵埃小人得智君子喪財秋分之日天柱主之閶闔風至凡事和濟沖逆風來帶刀入市白雲歲熟晴明物潰風從乾來人多患豆坎上大寒陰風冷㵵艮上風來臘月寒凛冰結琉璃民不堪甚風從震來人多大疫木再發萌花多結實風從巽來十月多風離來兵動國憂不中風從坤來土工大作兊來吉利歲豐民樂立冬之日天心主之不周風來民皆樂意沖則民流晴民大利風從乾來王道正明八方和暢萬物廉平風從坎來冬雪殺畜百姓安康君子受辱風從艮來地氣發泄人多疫病人不安業風從震來寒雪如如巽來夏旱冬寒不舒風從離來五月大疫來年應之遍村災厄風從坤來水蟲殺物魚鹽倍貴人亦生疾風從兊來山澤起兵人造妖言人流業傾冬至之日天蓬主之廣莫風至國祚安亨沖逆民散雪寒則貞晴明不利四方動兵風從乾來強國有憂年多寒凛江水結冰風從坎來歲豐民樂艮上風來正月多露風從震來時雷不發大雨連行草木暗殺風從巽來蟲傷生物離上風來乳婦亡沒冬溫無霜水旱時疫風從坤來蝗蟲傷稼田多水災米湧不價風從兊來秋雨兵起國祚不安有憂無喜五若會吉門災亦不興若會三奇禍亦不起直符貴人為表直使為始將乃青龍白虎乃帥巽定於四時八風已矣君臣父子部天禽之星君臣法式觀察休祥正元一日立春之時同其厥刻落在乾方三奇為直上合吉門九州如一日馬同并肅清疆場日祿同并外邦納璧日破虎蛇歲中有疾功曹貴人挺生子息天神二后收納寵戚太沖登明虜人侵域功曹勾陳失土亡邑若在巽宫失中反得太乙天空水火之厄六合勝光進賢師伯大吉天空拜將督軍小吉青龍納相經國干合支合儲君可立傷門主和驚門主辟貴人在治將為罷黜德合德使東床進人諫垣昏昧丁癸相加大吏互謀乙辛相驀后族擅權入墓三奇閹官司權六儀刑擊監守疏謬窘迫八門宰幕癡兒歲月時孛百姓亂市時干損日宰叛欲萌二星相入塗炭四方飛伏六庚殺戮無明大刑之格外道動兵太白行符中國興師留將太白返吟伏吟郡肅盜賊何以明君直符為則久患復災天乙飛宫忽生微痾伏宫天乙蛇虎開符魁剛迸迫落在離宫吉凶勢急死門來前嗚呼悲泣甲丙相互壽同南極六甲得使怡然進往宫神德合八表歡呼九循成時堯天舜日休門水也景門人也旱則杜門驚門主賊開生二門歡飛鼎集傷門天任文星豐歉八方落在艮震五穀豐穰貴青龍六合芟稻行行勝光太乙遍野白四民樂業神附魁剛朝綱整肅勾陳在傍壬癸蛇雀巳午旱晒倣徨傳送天后水漲陂塘天空太乙火傘高張若加丁癸草木焦黃丙丁在位冬無雪霜戊己在位秋有嚴霜庚辛在位春無雨澤甲乙在位夏少陰涼壬癸見虎人病難安天內之星司人疾忌元正七日交春同例不見登明秋有瘧痢白虎勝光少年勞瘵亥武天剛傷寒熱異火將火神瘴風疫氣更在絶鄉死人盈市太乙太陰喉咽眼翳六合從魁顛狂發疾天后太沖滿城邪祟大吉勾陳山魈會集小吉青龍死門合配加之六庚與直符對地動山搖民飢憔悴天輔之星道德淵深若遊乾位君臣喜深坤宫對值賞贖珠珍兊宫為直貴米賤金巽神在位萬木欣榮百花競秀鼓舞園林來遊離震霹靂震驚艮同二后孕者傷心魁剛來并産難平生貴人白虎傳送坎臨地藏發泄金玉露形天心之星日月光神乙辛乾艮日浮彩雲丙庚來兊月粲華精丁癸來巽星搖帝庭螣蛇太乙月色如金朱雀大吉日色如銀星流入斗天空在坤彗星出現白虎居辰大象天心宰司萬神休門同會神鬼威靈死門同會神死不欽傷門同會神鬼空名開門同會祭祀得福生門同會得福杜門同會神鬼潛形景門同會天吏遊巡神不敢驚門同會妖孽生民魁罡太乙紛紛螣蛇貴人天空神威豈聞朱雀傳送神絶音勾陳立廟開基預知興衰天心在乾香之半千坤宫百若來巽位日下除遷大忌離位神命不專坎宫陷溺神鬼若來遊艮千載綿綿坤不久立兊亦不堅神鬼之力人亦可先與君一法切記心傳神鬼撓人聚石于乾石重百斤神鬼招愆石重千斤罪聞于天埋名于下地祇來前追隸幽陰永不回轅人神異道千古流源神祇聽之急宜藏潛靈寶聚玄部聚玄一經壬加遁式丙名熒𤊨庚稱太白若會朱雀小謀大得如同太乙歡樂酒物登明天后事起爭鬥天罡河魁主客逃走或為日馬死神同偶人傷必亡興言有咎或為日祿美人美酒或乘勾陳財空訟有日鬼同傳夢怪驚喧如為日墓孝服離蠲貴人在治官事牽纏加之直符獄死之冤乙名青龍辛號白虎日祿同并婚姻宜舉勾陳在中不可動土人口死亡禍連先祖螣蛇在中財帛遭估日破同之眼目之苦玄武登明走失難尋如逢空亡物不離門天空亦爾物色仍存月厭天鬼百怪出呈虛聲雷電金呌鍋嗚癸名玄武丁曰朱雀三刑在中文書失却日馬同傳文招架閣日破同傳文狀汙著如值日祿文書貴人在治恩褒詞祿青龍太常文武醫卜萬事天剛河魁出行無日更逢白虎屋閣屢頽天后萬般厭翳財穀成灰勾陳六合太乙傳送四將甲名天福丙名天德日祿齊并萬神必尅莫逢日破日鬼日殺成則反敗得九失八螣蛇白虎從魁傳送凡事兩重勾陳天后所措難通太乙朱雀盜賊難容月破月厭公訟頻攻青龍太常官爵高強又宜興利百事皆良功曹朱雀遷轉榮昌庚號太白癸曰玄武若會螣蛇船遭溺苦脫嫌錢財物不由主白虎傳送出行逢虎月破月空酒食歡濃月刑月殺財利不空日鬼日馬奔馳西東更怕在門死厄人凶已為勾陳庚來會同登明從魁橫事相牽若同白虎卒病成顛螣蛇天空人事逃潛河魁六合火燭湮然太陰天后得大名傳金神劫殺反有威權內同傳送病語難言六儀擊刑朱雀勾陳杜口無詞多招罪名犯洎三殺拾得金銀如同驛馬門鬧西鄰又兼日破狗咬遊人三奇入墓切忌登明文書反覆作事沉吟天罡河魁反暗為明貴人在治獄事通情白虎螣蛇失喪傷嗟行人往反作事如麻太沖六合行人還家太乙白虎女子淫邪功曹天后太陰從魁師童上門道僧送茶從魁貴人不然勝光男子中風不即癡顛風伯雨師風雨連綿丙為熒惑直符難壓傳送太乙遭官入匣朱雀螣蛇毒食堪嗟登明神后所謀死神死氣陽人死配生氣生神進職添金日馬日符禁了窑爐劫殺羊刃貴人日馬良善遭坑日破為鬼如合為一妻被人誘直符加庚防損尊人加逢日鬼為馬夫妻爭論天罡白虎惡人上門河魁螣蛇師巫不大吉小吉問穴修墳天鬼玄武人病為瘟太乙天空屋倒撑門功曹后合罪刑斬首太沖沉船從魁弔首太常不死顛折腳手反吟伏吟爭論事醜天神二后女被男守六合太陰男逃女走時干尅日玄武喪失若會空亡二事併一加之勝光多生憂栗蛇虎同存殺人驚嚇知三避五八方無阻直使來震斯且為三直使入坤此即為五五乃死門喜見勝光朱雀螣蛇太乙同所大貴提携小人欽慕三為生地莫逢白虎傳送從魁太陰會附生變為死吉反凶苦若聞鴉鳴急視景門直符前一劫迫來臨惡人逼騙取索資金前二口舌前三婚姻不然爭訟鬨講門庭前四鬭驅財利相爭直符後一事涉女人後二欺弊淫欲姦萌後三亡失衣物性更尋六丙下值何神河魁在下縣官憂驚六畜災死不賽神明從魁在下寡婦傳音上逢吉將酒食邀迎傳送在下人來覓物小吉在下婦人喜成勝光在下徵詔歡欣太乙在下人吏相尋天罡在下爭鬭訟死太沖在下酒食邀迎功曹在下慶賀大吉大吉在下親戚得朋神后在下登明在下吏索公文又須聽聲過何方隅以之占異鳴占烏斯決無虛神祕之旨慎勿輕傳通神九遁部天遁幽玄得遇人賢生門合丙丁臨丁前如逢生氣日祿在中日破在中百事莫言日鬼在中萬事牽纏日合在中罪人得禍貴人在中恩赦傳宣天空在中奏對宜先天剛河魁大忌行船地遁功曹必遇英豪開門合乙下臨六己更逢朱雀文書遷高月破在中去失詢褒登明神后陷為軍曹太乙勝光胥吏莫逃如見白虎瘧疾成勞天后太陰拾得朱金日鬼在內却有人尋神后魁罡女人犯淫青龍風伯風雨淋淋太常大吉龍出山林更加天柱水入州城勾陳白虎兵起虛聲大吉小吉釀酒難成人遁通靈休門六丁太陰宫合白虎船沉勾陳朱雀眼見鬼神大吉小吉風雨不寧日祿在中行逢貴人日合在中百事光榮日鬼在中神鬼人通風師雨伯雷電山崩魁罡同位災患相鍾風遁六子休門加癸上合巽卦朱雀訟起天后陰人太陰老婢六合功曹婚姻之喜白虎魁罡事多靡委天空登明凡事中止青龍來并傷折身體螣蛇入傳沉船壞米月合在中有船扶衛月厭加之炎炎火起天后傳送婦淫無恥更見魁罡刑名已矣龍遁高升生門始因下臨六戊上合天心大喜天后玄武同音盜賊早止姦私相臨風伯雨師風雨霖霪日破在中水出山陰日鬼逢馬狗立中庭日祿日合日刑日盜百事虛成更兼朱雀青龍神后水㵵江津登明河魁雲雨不虎遁雄雄開門庚同下臨兊卦怕有青龍師巫作梗如逢河魁犯殺天空又同白虎風起山崩神后玄武劫殺宜攻所為百事喜慶重重月厭在中追則逢凶日祿日馬財穀豐隆天殺三殺亡殺劫殺貴人在治戰有奇功為客者雄鬼遁藏神休門六辛上合天輔百事不任太沖朱雀書府厭人白虎河魁神鬼扣門螣蛇天罡鬼附人魂從魁勾神妖邪見形傳送六合釜呌鳩鳴如逢日祿鬼攝生人如逢日馬賽願酬靈如見日合謀者已成日破日盜失了銀瓶白虎同位盜不離門登明朱雀田屋爭論太陰太乙修整新墳若為日破水逆山橫天鬼作虎人死遭瘟陰聲為宅神鬼崢嶸雲遁風會進退不昧生門加壬上合天內太乙河魁雪如拳塊龍虎天罡暴泊之類玄武太沖風旱之凶螣蛇勝光缺雨求仙長天紅電日祿在中黑霧迷野必是青龍若為日墓山魈蛟蟲白虎刑殺殺人無蹤神遁精光六合皆昌開門六己天心星藏大吉小吉人塑金剛白虎玄武創起壇場如為日祿會社焚香神后天后登明保佑太乙太沖太陰招凶從魁河魁六合勾陳白芒光出神示威靈朱雀傳送許賽神明劫殺白虎雷電擊人天空太常貴人功曹賤人從良加之日合百事吉昌九遁成錯智者審之來吉去殃尅敵制勝部治亂之法要視驚門星吉得遁萬里縱橫呈凶孛格出無寸功入有仇人三奇得遁可保全軍如比白虎傳送日破主者難存白虎猖狂又加神后勾陳同位大戰將論大刑飛伏玄虎傳送攻之必敗守之必懲直符之格如同太乙螣蛇在位戰鬭兩傍金來入火即主交兵火來入金姦詐虛情戰而不爭緊切勾陳此將之下怕逢三刑若尅今日定有爭戰上下交難并刑亦戰如欲不戰宫神得合六甲得使丑未加辰加日兩解旺相功成又有遊都偶成六害勝蛇夭矯及見六庚二家相并戰血流腥勾陳勝玄反首跌穴如無刑格所攻必贏主者言命貴勾龍虎驚生開門唾手功名勾陳有氣不制其地上逢九遁敵有降情敗興不敗更問六丁入墓三奇六儀刑擊年命相逢所戰必殆傷門白虎飛伏之格日辰加之不宜攻寨孛則亂也賞軍可賴天月德神青龍年命開門合之建功必大用時之法莫犯雷霆雷公坐時龍虎聞名正月之節起於開門就起初一子時同論二月起休三月生門順行十二八卦分均月上起日日上起時數至震宫撞入關刑大將防辱人馬難存夏犯白虎兩陳亡奔貴人在治謹緝姦情若犯青龍若言屯守士卒亡魂勾陳從魁百戰百神后天剛河魁不戰功成或聞鼓六合青龍娼人歡樂勾陳刑太陰祠祀玄武相傷陳次以定遙有季神姦惡仲神乃商孟神所在必是才良若持刀棒忌亥子卯巳為賊殃寅申辰戌吏欲匿藏酉午丑未此抽軍避敵直符之方下臨四孟向右宜藏仲季向左及直符方伏於九地六癸為良恐賊有伏支干通靈直使之下預得其詳上立子卯寇設姦心上立申巳必有伏兵王相帶刑必逢大戰空亡休廢不敢相征推在前後直符而占巳申子卯立處循傳立支在後立干在前支干相覆當路隨軒對疊飢渴缺水求漿休門之下神將為良若見太沖後有池塘若是小吉井泉汪汪若是申酉江水洋洋急於糧食救援無方生門之下大吉為糧小吉得酒太沖牛羊從何而往訪取天罡斯為大路直透關梁倉卒用之難可尋詳與君一法不得思量宫神德合進謀可也三奇得遁萬事成也六甲得使貴人成也青龍返首吉事來也飛鳥跌穴喜將至也青龍逃走人亡失也螣蛇夭矯凡事逆也朱雀沉江文書失亡白虎猖狂橫事發也三奇入墓事不明也五行不遇理不伸也熒入太白事將退也白入熒惑大格之時不可謀也刑格之時凶及己也日時在孛歲月日格起爭鬭也留符行符人如值伏吟我不去也返吟之格詞訟求財休門合奇遠行婚姻祇求逃避杜門蓋奇謁見貴官景門征戰殺戮驚門蓋奇博戲求謀開門蓋奇若得蓋三奇遊甲凱歌追隨玉女守户兩用間離若有昧與君一法誠哉希奇斧鉞加項天能祐之上書奏表理法邪非不及旬日喜氣怡怡天皇大帝輔弼之時甲己之日有甲子時乙庚之日申是神基丙辛之日午上為宜丁壬之日辰為之儀戊癸之日寅中是輔六甲之日何禍可施天機盡矣保身援持切勿輕傳銘之佩之玄精碧匣靈寶聚玄經卷下終
