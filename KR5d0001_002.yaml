front:
  text: 玄精碧匣靈寶聚玄經卷中取二
  hash: sha256:777c98dae0fc64684324640c281f6ba6e2319cd28fa5bd0b576dbfab77ba51d5
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0001_HFL_002-001a, image: hfl/0618/0618-032.png}
body:
  text: 六氣混元部太初肇判三景開明九玄之中清陽絪緼八景冥合挺生六神光焕紫虛鬱流玉精分道散軀六十之辰五行凝結洞耀九宫金木水火土變化雌雄分景散靈千有八十出玄入微洞達無窮氣包天地精冠太空能離能合能陰能陽能上能下能死能生能有能無能成能敗天無六甲三光不明地無六甲五嶽不成人無六甲不能保生遁而演之妙道之根能通此靈六合齊真用參天地萬法之門六氣順運旋轉十天六甲流布周行幽冥甲子之祖名曰桃平甲子之父合景遊并甲子之孫曰王文卿甲戌之祖名曰避方甲戌之父刀兵萬重甲戌之孫曰展子江甲申之祖名曰上蓋張甲申之父三會龍英甲申之孫曰扈文長甲午之祖名曰五冲甲午之父三練六爻甲午之孫曰衛上卿甲辰之祖名曰三寧甲辰之父羅列羽兵甲辰之孫曰益非輕甲寅之祖名帶理非甲寅之父秉金荷旄甲寅之孫曰明文章在帝之庭調理陰陽六十之子造化維綱所居六宫祚運休祥正宫直符前宫六合左宫太陰後宫九地中宫勾陳循環逆順上佐高真六十甲子助成天德年建月建日建時建期神立之垂名遁典飛天法輪部廓落高張八卦分列剛柔磨蕩經緯不竭俯仰天地彌綸日月天斡地旋始生丹元一氣才通上應天蓬運水於下幽都玄宫壬癸乘位變化無窮元氣凝滯閉塞而冬天道不備上昏下蒙金至則結木至則空水至則冰土至則崩火至則滅神明莫通坎卦已陷門生其中故名休門陽氣始布萬物以萌遠行練卒事始取行為無不利出逢陰人紫碧之衣或見交爭若守離宫乃迫乃凶風盡氣潰朱靈開昧因他之利戊己生外厚載之基上應天內立秋物死日殞之鄉金至則質木至則藏水至則澄火至無光土積為丘萬物皇皇地氣不升門主其中故名死門陰氣盛焉葬埋弔咳形戮追失吉有所行中途異疾出途患人或聞哭泣運入坎宫迫塞之凶氣行乎震蘭臺之宫雷藏雷蟄上應天沖春令方布暘谷潜通甲乙來位萬蘂千紅金至則缺木至則森水至則潤火至則魂土至則阜萬有部分氣運大通門生其中故名傷門得以理功大宜漁獵殺傷有獲若以言行中逢盜賊出見火光伐木取梁運入坤艮迫則凶殃氣接天霐蓄風巽户春夏之交上應天輔金至則伐水至則墓火至則炎土至則庫木至則林萬該鼓舞發泄過中門名曰杜杜者塞也六陽絶數邀繫誅逆隱伏神助出逢男女並行道路剔損手足以應其玄又為吉事如入昏霧運入艮坤謀者必誤中來宫生黃庭五星齊耀上應天禽上下無常坤母而乘天靈府之興為父之道上應天心金剛為體百靈已成金至則響木至則榮火至則育水至則清土至則巍熟知其神高不可仰低不可侵門生其中故名開門陰氣盡矣變化之因遠行得喜大宜出軍為無不就酒食交迎出逢茶酒或見貴人運至震巽迫則虛名大化以彰肅殺可懼尚書宫中上應天柱庚辛之神嚴令以布金至則光木至則荒水至則涸火至則亡土至則竭萬木焦黃天地不安故名驚門吉事必危凶事必貞戰鬥攻破他危我存出逢害腳眇目之人或聞恐怖或見交爭吉行中道為吏所擒運至震巽其禍立生天地失德酷之大甚宫生玉房上應天任陰陽回運萬有俱刑金至則朗木至則萌水至則潤火至則溫土至則穡故得生成天道大同故名生門于謀必獲謁貴得親出逢巧藝皂衣獨行或見車馬紫黃衣人和氣已播不可殺生出征戰敵必犯天嗔坎宫迫害取瀆幽冥挺立絳霄南陵炎星純陰交結上應天英夏之為氣丙丁之精金至則冶木至必焚水至則死火至則興土至則飛萬物薰蒸四方赫奕故名景門上書遺賜麈戰破圍吉行中道路必亡遺出逢鳥噪或有追呼又有酒食見人赤鬚窮神知化悔吝殊途九星八門旺相之圖鼓之雷霆旺子之符潤之風雨相身之居日月相繼死父之模寒暑運行囚鬼之户陰陽相薄休妻為預動靜有常群分物聚逆之則灾迫之則苦八卦已彰八門同處吉凶榮辱逐時為主萬用皆知非特軍旅凡欲有為興衰是取旋斗歷箕部大哉九皇喉舌天地變化九垓各分其隸天蓬子禽上歸丹元下守地玄保守長久立國安邊起造移徙失火連綿嫁娶傷産商賈逢冤出行軍旅春夏宜前秋冬莫往難保回轅性主水火盜賊之愆安墳立冢却保萬全此日之時黑雲靄天赤雲大勝青雲莫先白雲無功黃雲沛顛日奇乘之攙搶凶源月奇乘之伏龍不忺星奇乘之文昌英鮮天內子成上居朱靈下守地阜交結受道最得良助遷移築室大有迷誤嫁娶訟修秋冬益户大忌出軍軍亡將㱠出行經商分財散侣口舌非理八方塞杜此日之時雲生煙霧黑雲則吉白雲難拒赤雲盜侵青雲事悮日奇乘之浮雲蔽注月奇乘之脫厄可去星奇乘之解攻挫武天沖之翹上居蘭臺下守地蒼行軍伸恥威耀八方破圍攻敵得以安康嫁娶産厄傷敗相妨上官移徙死亡不臧祭祀商賈離流他方此日之時雲氣潜藏猛風激雷四極飛揚日奇乘之龍威得光月奇乘之印綬永長星奇乘之福祿繁昌天輔子卿上居天霐下守地剛行軍大勝萬里雄强秋冬無功可遏邊疆移徙婚姻春夏榮昌上官利武起造尤良秋冬用之盜賊凶殃商賈不利築室禎祥此日之時天末雲忙青雲勝敵赤雲黑雲亡敗白雲倣徨日奇乘之百戰百長月奇乘之五福悠長星奇乘之冠帶榮裝天禽子公上居黃庭下享地齡祭斷滅凶群行軍四季立爵逡巡執仇討賊不戰俱擒葬埋五福來臨上官文吉移徙如心春夏之月小撓來侵所為百事無不豐榮此日之時雲氣深沉日光晃朗敵畏其名日奇乘之雙輔得人月奇乘之日月踊輪星奇乘之還同七珍天心子襄上居靈府下守地魁求靈治疾不至徘徊行軍戰伐得勝擒魁春夏不利秋冬無灾遷移嫁娶得遇梯媒築室祠祀惹起凶衰行船隱遁稱欲而回商賈起造立見崩頽此日之時雲氣崔嵬不可出戰動則鋒摧天清朗然萬里通開日奇乘之曜明九垓月奇乘之試水探財星奇乘之車駟迎來天柱子由上居尚書下守地晶大宜固守勿可行軍全師不返將者哀聲嫁娶離别修造灾侵移徙商賈百事不任私藏隱跡却保安寧此日之時雲氣如蒸青雲喪亂赤雲兵臨黑雲奸至黃雲有驚日奇乘之匿辜絶音月奇乘之杜塞防擒星奇乘之復榮而成天任子韋上居玉房下守地牡行軍大勝萬里無阻嫁娶大昌上官不武商築修移反招憂苦春夏尤宜謁貴神助此日之時雲生煙霧東西南北八方得路不戰用謀敵人自懼日奇乘之金玉如堵月奇乘之重光入户星奇乘之龍壽升舉天英子房上居絳雲下守地形遠行舟楫君子交迎出師敗潰商賈財空修造屋宇失火重重上官祠祭瘟疫來鍾若言嫁娶大有興隆此日之時赤氣陰濃攻擊退失亦有狂風是為不吉動則兵凶日奇乘之雷奮天中月奇乘之障翳英雄星奇乘之禦鏃難通休囚乘之出户呼從凡出天蓬三稱子公萬神遜避得以全功凡為將臣切記心胸回度五常部天道高邈五常回度陰陽位分幹有十數甲為天福開闔門户能知三甲一開一杜不知三甲六甲盡杜攻戰行來客兵神助賞功封爵伏吟喜遇聞事並虛冥謁及賈入宫有喜移遷嫁娶不可行移天庭不護六乙為直往來恍惚日精相從與時俱出行兵大勝名曰天德攻者必權殺者必獲聞憂不憂聞喜不喜移徙上官商賈大利若行威刑欺妄立至六丙為直萬兵莫往比若侯王攻戰毋賞大宜行軍聚立營杖月精相從受人欽讓入宫者遷市賈無量聞憂不憂聞喜必暢不可私惠乃主逆叛又名天威所為興旺六丁為直出幽入冥神鬼難明至了不刑安刀在頸尚安無驚逃亡絶迹人不見形憂喜半無灾因婦人人市有利上官遷名又曰玉女勿可揚兵六戊為直乘龍萬里道無呵止大宜遠征無憂有喜上官市賈並得少利又為天武凶亡必治六己為直如神所使不知勾神出沒凶咎祕密陰私為無不就無喜有憂入官遷授嫁者半吉市利半有又曰發明故舊六庚為直抱木而行强有出者必逢鬭爭又曰事多邪觸舉事之時必被淩辱若也得知不抱三木不反縛入獄聞憂必憂聞喜未卜固守主必戮嫁娶利市必蹙大行斬伐以為天哭六辛為直行逢死人强有出者罪罰纏身又為天庭毁垣而行若也不知身被扭刑羅網自纏罪繫公庭行軍主勝憂喜平平入官有位後不遷名市賈不售嫁娶灾臨以正法律却可戒懲六壬為直為吏所禁强有出者非福來臨又為天牢必遇冤讎為無吉利吏必呵留行兵主勝追盜必囚入官移徙三縣五州憂喜俱無市利難收六癸為直衆人莫視不知網神出門即死又為天藏求仙可以憂喜俱無嫁娶無子兵行絶蹤入官遷起移室困窮市賈中止天幹主司吉凶所倚順吉避凶如斯已矣受度歷關部上官攝柄八門最良六神司之以陰輔陽陽年開門直缺為主乾宫起子順九天堂陰年起杜勾神為主年起子逆次九地傍年定起月月定而椿就起初一巡至何方視龜滌篆坎宫宜祥坐其傷門任不久長星加天內尤為不良蓬英冲柱若起凶殃驚門在坎虛度時光必招愆期治疊還鄉下兀死門太陰開門直陽年起符子順行景門六合休門九天上元柱門勾陰年起子逆行陳至本年起正月至本月就初一生門九地若會開門終始安康恩霑寵渥朝見君王若會休門萬政聲美譽九天稱揚若會生門不威而治八方無競九地若會景門公明得薦名傳六合紫詔來翔若會杜門勾陳上水火盜賊隄備按章若會死門太陰下兀號令失正立有停喪傷驚二門日月之方日逢二兀急且潜藏凡得日吉復欲時利星門位吉方成大器一切孛格為官不遂符事相刑立致敗戾門立三奇永嘉鼎位戰鬭必勝部凡欲戰鬭先審日時陽時高鼓鳴鐸張旗陰宜潜伏消敵之威我寡得安彼衆必危倉卒接戰循門安奇立於天乙萬里鋒摧次居直事敵畏如雷背生擊死得勝無疑天陰雨沉四方昏迷又無刻漏難分正時須憑運式或氣可知奇門合處已午未知或臨日將奇門同比又有三勝法背亭亭擊其白奸向其天門又背月建次背生神二星相入匹馬不存四散全備難保朝昏符事加白大損其軍大刑飛伏車馬損輪九星衰弱敗勢傷魂九天之上大宜揚耀九地之下可以守屯太陰之宫隱伏如神六合之宫私謀潜奔大凶大殺宫犯勾陳甲丙相互威德之靈上五陽宅下三吉星奇門不迫星儀不刑繹此四科萬事必寧時干克日將主虛聲行軍出陳亡敗之名靜則晦昧動則無榮丙加死門孛亂將成死加丙奇陳亂縱橫丙加傷門戰傷加丙奇內亂紛紜乙加死門營寨空存死加乙奇軍器乙加傷門不可攻擊傷加乙奇敗不堪輪如有此式將來不可敵去莫可追與君一法斬桃陰枝取皮書符足履斗魁草木化人助我軍威爭山奪險尅敵破圍如碬投卵順合天機不可肆殺恐招愆期告爾將成正心勿迷宿命因緣部人倫婚姻陰陽直圖周堂天吉東震為模大月起坎順行艮户小月起兊逆行坤隅入巽損公入艮换姑入離傷入坎尅夫入兊殺婦入乾無虞乾坤震位慶集門閭陰陽有將支干相犯陰將殺妻陽將殺夫陰陽不將上合天符每月厭前取其天干厭後一位次把支扶支干合日不將為除大槩如此未為合經欲得無灾先考九星九宫所隸凶吉殊分先定天蓬次取天英水火之性唯禍乃膺一宫曰坎二宫曰坤一兒兩女此今生門神不吉父母不存殺妻三人離了再婚運入震宫兒女尅盡門吉一女子出廢人運入巽宫兒女兩雙全陽得半全陰絶房主立他姓必招外郎運入乾宫兒女兩房移昭六子三陰三陽女大男小以得高强運入兊宫夫妻不刑四子三女保得平生運入艮宫父母生離妻懷無子多損多疲運入離宫家舍不寧背其祖業多子多孫晚年一子破蕩門户一女有憂一子貴次有天任天內天禽三星為使任性常沉運入坎宫兩兒三陽灾至母疾子分運入坤宫家舍不明門合則吉不合則凶子孫不定為道為僧運入震宫主生兩女或為兩姓陰陽缺文二妻有尅定有三婚運入巽宫四兒兩女子孫吉泰父母增榮運入乾宫陰陽三人三陽損妻三陰殺兄運入兊宫五子六女僧道俱出門吉則許門逆則損前後父母運入艮宫夫妻不定兒女八人分頭養命門吉則安門凶則病運入離宫父母有隔老得二子多生少得又主就婚乃為贅客天沖天柱金神木主運入坎宫望門妻苦兒女八人六人死旅運入坤宫少年散失三人損二晚年孤立運入震宫先尅父母不然兄弟以及妻蠱門吉一子又生二女縱得吉昌也破外祖運入巽宫五陽三陰吉門尤吉家道隆興運入乾宫五兒四女中生貴人離隔父母運入艮宫女多子少多尅妻凶不然逃走全家絶嗣有子必離八陽尅六眼不光霽外姓寄住星在兊離天輔天心福得彌深運入坎宫五陽各存一子逃亡一人貴名妻犯産厄祖破財分運入坤宫三子三女若生四女定損一丁離了祖宅亦出富人運入震宫定生四陽內有大貴家道榮昌運入巽宫主生四子二人大富二人至貴代代不絶貴中有貴運入乾宫望門尅妻不然絶嗣家道飛灰運入兊宫四兒二女兒子尅盡兩重父母運入艮宫子生多積止得一子妻尅五運入宫不然離隔三陽好鬭內有貴人家隆豐厚萬象開張部造宅修屋九皇最該大要禽輔天心星來奇乙丁生甲丙互位宫神德合六甲得使進祿添財丁癸相加乙辛相墓三奇入墓焉得無灾二星相入大刑飛伏一切孛格立見哀哉又詳化氣直事神裁變為八色九宫飛排上元之年甲子起坎乙丑之月逆至離魁丙寅居艮次序逆回中元之年甲子起巽乙丑之月震逆為媒下元之年甲子起兊乙丑之月逆至乾開六十位上次第輪回月色之法亦取三元上元之歲正月起艮二月居兊三月乾天中元之歲正月坤上二月起坎三月離前下元之歲正月中五二月巽四三月震邊各宫定位並起中垣一白二黑三緑四碧五黃六白七赤英鮮八白九紫八卦之原假令定局以坎為例一白為五中宫起內二黑飛乾三緑飛兊四碧飛艮五黃飛離六白飛坎七赤坤外八白飛震九紫巽會添人進寶喜慶咸來修逢二黑死門之精橫遭官事及犯徒刑鰥寡夫婦多有喪停修逢三緑傷門之精偏損孕婦骨肉離分殺傷自縊盜賊相親修逢四碧杜門之精官司驚險瘟黃到門禍主人死立見灾迍修逢五黃犯著瘟星披頭枷鎖斷絶六親閉門而厄天禍頻頻修逢六白開門之精亥子之月添口進金羽衣人交橫寶相成修逢七赤驚門之精腹中常患連惹小人修逢八白生門之精添人進口家道隆興修逢九紫景門之精添財進喜取驗分明生向八門此訣同論斬絶地根部葬埋之法支幹通靈甲庚之日比申與寅丙壬之日比辰午申六己之日比未與酉六戊之日遁甲無聞乙辛丁癸比酉與配玉犬高吠金雞獨鳴地虎不食可保千春須要是日山向奇門下通地曜上合天星坐山定穴吉凶預存羽以廉貞宫以文曲徵以破軍角以巨門商以貪狼起於中庭次飛出乾坎兊為鄰若犯文曲家道不興離鄉男子淫佚女人若犯破軍病訟不停長女殺夫長男戮刑若犯祿存兒孫短夭腰駝背曲眼失光明若犯廉貞官事牽縈父子分别橫死他程貪狼武曲輔弼巨門加官寶曜慶集門庭內得一星名利超榮入冢之時亦定九星禽心沖吉次輔天任死門蓋奇及以開門下穴百日萬福來臻斬絶地户削滅死根天地定矣萬邦遁形雌雄七殺正呼傍鄰重賭三殺太歲諸神周維衆惡怎敢照臨忌驚傷杜及景休生拜五不遇門迫儀刑三奇入墓反伏之吟坎應一載坤應二春九宫九歲灾禍來侵欲知新故穴向無難聚玄了知不須登攀先定死門乃為法式先鋒助之穴向其間旺在支下休囚對顔次其日墓乃是來山明堂放水登明來還貴人逆則及是虎去龍間反吟八卦回龍出求殊不三合六合祖墳在側陰陽不備後龍短慳四至不墓前左右支食最良亥子隔水寅卯橋梁丑為田曾經改劫巳午窑傍申為官路未即社堂酉寺神宇戌是荒村日辰墳也天內主藏土神土將重疊雙雙木多林茂水多流長火多光秀土多峰巒金多若石道不虛揚兹實通神九地靡常擒神捉鬼部人之有生繼之以死觸犯身星壽將止矣欲知方隅八卦為起子午卯酉男命之始一歲艮八二歲九離女命中五巽四逆回寅申己亥中五為儀二歲乾六女艮逆推辰戌丑未起於坤維二歲震三女亦坤回二歲乃坎犯者尪羸一歲十歲零數順飛命星之殺對宫為之鬼神所在各附其宜乾為天門巽為風户直使所在鬼在藩籬坎為水宫離乃火府直使所在鬼附房閨艮為丘山坤為地户直使所在鬼附厨憧竈神之側辰出酉歸震曰雷門兊為大澤祖先堂內酉出神回擒勦之法若梯若媒上土下木斯即竈堆上金下木非刀而誰五行配象合體而推助生産法陰陽相持五行缺一致令生遲深可憐憫故泄天機妖邪遠避子母分離後來賢哲依吾救之直符甲乙以水淋漓直府丙丁以木令欹直符戊己以火焚圍直符庚辛以土節飛直符壬癸以金鳴催返吟伏吟外家生歸五缺備降厄神切勿驚怖可保無違直使陽宫乃生男女直使陰位不返閉大法萬神咸遵神霄玉府八卦雷霆驅神捉鬼缺九宫一轉天地知聞凡欲遠行謁貴嫁娶市求立門而呪先出地户六甲九章天圓地方四時五行青赤白黃太乙持我日月為光禹帝治道蚩尤避兵青龍隨軒白虎挾行熒惑前引卻除不祥明星北斗誅罰凶殃五神侍我周旋四方當我者死背我者亡左社右稷寇盜伏藏行者逢吉留者必良五神所在所需皆昌急如律令禹步而藏牽籌閉户左入天門立門而呪勿入圍疆天門天門今日吉昌玉女侍我左右遊傍行來四出不逢禍殃君子見我喜樂未央所求如意百事吉昌急如律令禹步入堂立於玉女再見呪意三稱玉女六神至矣試與我行到其某處杳杳冥冥莫睹吾形人不聽聲鬼不見精善我者福惡我者殃莫令邪鬼見我行藏當我者死追我者亡千人已上萬人之中見我喜悅急如律令左手劃地閉門而去行六十步不可回顧得神扶持精邪避路倘或攻戰捉神驅處先出天門别念呪語青龍白虎朱雀玄武勾陳六合送我某許天返地覆九道皆塞有來追我至此迷惑以東為西以南為北乘車追我折其轂輻騎馬追我掩其馬目步行追我腫其兩足乘船追我急令傾覆揚兵來者令兵自伏明星北斗卻敵萬里謀我者亡追我者止牽牛織女化成江河禹步右轉回入地户立門而呪喏喏澤澤行無天返地覆心中所欲得隨我意使汝迷惑隨斗所指與神俱遊急如律令轉入與天逐精行若雷電八極耀明徹表視裏無物不伏兵戈自滅謀我者絶對我之人魂飛魄竭急如律令出門施設鎖鬼縳神玉女呪曰某上玉女急來護我無令百鬼邪中傷我人莫見我人莫識我人見我者以為束薪人識我者目為非人獨開我門而閉他户急如律令閉門而去又有戰鬥倉卒不停急於對敵天地不成左手持刀劃地一旬本日支上入局中庭午向作方丁罡呪文某甲有急佐我扶我匿我藏我毋使敵人來中傷我令他五兵自當摧折當我者亡謀我者死自死敵人冥冥默默戰者迷惑直門户神某為我亂去魂魄急如律令左旋而出門户之神亦要知名甲子旬中門神徐儀户公孫齊解履而出敵不敢隨甲戌旬中門石戰御户神徐何大呼而去甲申旬中門司馬光户神天可解冠而去甲午旬中門神明衆户神干行將衣振捽閉門而去甲辰旬中門公孫錯户司馬勝解髮而去甲寅旬中門公孫光户司馬强解帶而去或有下寨閉戊安營大將持刀立於天門本旬戊上取土六斗俵於六戊按刀呪云泰山之陽恆山之陰盜賊不起狼虎不行城郭堅固如同金關千凶萬惡莫之敢干急如律令正己行之必驗之術混合百神部天地定位山澤通氣雷風相薄水火相濟混而成之吉凶分隸六甲加甲青龍出地喜信必來門合則美門塞星凶空有財至六甲加乙青龍入雲三奇門交貴子生成星干不利虛得其名六甲加丙青龍返首凡事亨通兼得長久門儀不合亦難得就六甲加丁青龍曜明三門合吉宜謁貴人改官遷職大有英名符事投凶立待詞刑六甲交己青龍合靈吉星主財吉門事成星門不合徒費精神六甲加庚青龍符格起咎成凶在于不測星吉門順亦宜靜默六甲加辛青龍失驚門中一合萬事從心凶星上立財利亡傾六甲加壬青龍網羅陰人困之灾害多多陽人用之詭譎不和六甲加癸青龍華蓋門合吉星永無灾害若傷死門陰奸陽會六乙加甲陰中返陽凶星財破人口損傷陰人才合陽人荒張六乙加乙日奇伏刑貴人問之主失其名門合再叙門逆喪停六乙加丙奇儀順格吉星臨之授官遷職夫占其妻必有離隔六乙加丁朱雀入墓文書入官架閣留住星門吉泰文詞得路六乙加己日奇入霧土木混同兩有交互求事得微門乖必悮六乙加庚日奇自刑鬭起爭財必入訟庭星門不吉夫妻外情六乙加辛青龍逃走失財逃亡二事俱醜强立强為定無長缺文陽人主失病是陰人六乙加癸日入天網官事失財凡事虛安六丙加甲飛缺跌穴所有謀圖一切洞徹六丙加乙月奇浮虛公私利亨百事稱情六丙加丙月奇孛格文書門逆財亡門順虛迫六丙加丁奇入朱雀文書亨通貴占權握常人得之公文擔閣六丙加己火孛入刑文書不來獄中有人星吉門順空禁虛名星乖門逆徒杖而刑六丙加庚榮入太白家事熬煎又逢盜賊門合星吉賊在人獲星門相遺禍生因客六丙加辛月精合祐久病之人藥師來救文狀入官亦能成就六丙加壬孛亂來臨文訟公庭因淫婦人庶人流離貴人失名六丙加癸華蓋孛師陰人用之灾禍相隨必因詞訟後必無虧六丁加甲青龍得光貴人遷職常人得良星府合處喜美非常六丁加乙格為人遁得喜非常貴人薦論改祿受權實為廣運六丁加丙奇中復奇多生口舌事生蹺蹊貴招官祿常人刑之六丁加丁奇入太陰望文書至遠大名深兩重文意凡百遂心若信近用名為伏吟六丁交己火入勾神文狀詞凶始因女人私中有私往則刑名六丁交庚織女尋牛不有私情灾逢冤讎陰人無理刑禁官愁六丁交辛朱雀入獄官人刑囚亦遭剝落常人枷鎖百日放却六丁交壬五神相和丁壬化木財貴人賜祿文狀平和六丁交癸朱雀沉吟公私不協兩有相傷六己加甲犬入青龍門合吉星門逆凶星所幹成空六己加乙墓不明星門合合而逆凡幹不成六己加丙格名孛師陰人大忌奸亂乖違六己加丁奇入墓名文書當訴門合吉神先論得理後對遭懲六己加己地户逢鬼陰人望信信者難委門符合處遠信來至六己加庚刑格之名陰人發用必得陽人陽宜靜默陰主私情六己加辛魂神入墓家有陰人鬼妖驚户符門合處小口灾遇六已加壬刑網高張陰人奸惡陽人遭傷門迫星凶兩人俱亡六己加癸地刑玄武陰人沉吟寢病不語門合星扶遂成疾苦六庚加甲刑青龍格財利多榮星門法則不合則凶合則危厄六庚加乙日合大格百事安然尤當緘默墨門乖凶官方刑迫六庚加丙太白入熒失亡被盜難獲難尋門合星吉臟物知情符門不吉官事來臨六庚加丁名曰亭亭文狀爭論私匿之情符門逆背詞訟難成六庚加己刑格凶否獄囚之人難有伸理六庚加庚太白之名官事迸發獄禁平人凶期百日却有舒情六庚加辛干格白虎占路傷亡必失伴侣有事難休定執客主六庚加壬蛇格之名陰陽占信迷路無音傷門主灾死門喪停六庚加癸大刑之格占路遠求陰人疾厄鬼賊相扶遂生離格六辛加甲龍困遭傷係官爭財陰人不妨陽人六辛加乙白虎猖狂失財破家人多死亡遠行六辛加丙干合熒惑文狀虛詞競爭財物星門不六辛加丁獄神入奇遠行經商利倍得遲星門不六辛加己刑獄之格奴婢欺主先自刑克門吉星强虛成纍及六辛加庚白虎傷格兩女爭男皆因酒色星合門凶醜聲難塞六辛加辛獄入自刑求財喜合利用陰人陽人用之灾害時臨六辛加壬蛇入獄刑兩男爭女訟逼難停門符合吉首者遭黥六辛加癸直格華蓋陰人用之無灾無害吉門吉星陽人得財兼有酒食喜慶咸來六壬加甲蛇化為龍陰人求事喜慶重重陽人求事有始無終六壬加乙格名小蛇陰人伏灾陽人傷嗟孕生貴子祿馬光華六壬加丙蛇入冶爐詞訟爭論空自無圖若灾刑禁出則招徒六壬加丁干合蛇形文書財喜六宜陰人貴人官祿常人平平六壬加己蛇凶入獄大禍將成夫妻不睦罪若有刑金銀霑足六壬加庚太白騎蛇刑獄公明好分正邪如逢傷死刑戮無差六壬加辛騰蛇格干符門雖吉亦不可安所有運謀內生欺瞞六壬加壬羅網自纏陰人利用陽人莫前三吉不入凡事無緣六壬加癸螣蛇飛空家不和睦室女私通星門俱吉信息隆隆六癸加甲羅網青龍財喜姻親必遇吉人星門不合陽人訟刑六癸加乙華蓋逢星貴人寵祿權柄如輕常人怪六癸加丙蓋遇孛師貴人受官小人得依若六癸加丁螣蛇夭矯陰人文書為凶之兆損財六癸加己華蓋蛇户陰人問夫求至居住門順六癸加庚大格飛名只宜上官握柄雄聲公事得遲錢財有爭六癸加辛獄入天牢軍吏遭繫罪恐難逃門吉星吉虛禁無勞六癸加壬復見螣蛇陰人絶子又復離家理順後嫁未保年華六癸加癸天網高張行旅失約遊去四方合處相得逆處相傷昔日舉要計一百千留甲十干寄戊同安且以八方人來意用九宫支上却討時干如住宫中來人時是已課對宫從交上看玄微祕典一訣萬端倘非志士切莫與觀天機深惜智在克寬玄精碧匣靈寶聚玄經卷中
