front:
  text: 玄精碧匣靈寳聚玄經卷上取一
  hash: sha256:767714fe1b3ee76fa4c27f9b3cf847fd980ecf7cfc0632853f8f46905c3c90d8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5d0001_HFL_001-001a, image: hfl/0618/0618-004.png}
body:
  text: 赤明開圖部天機之書開明大道頓泄根源統之有宗會之有元範圍天地通乎幽玄陰陽匹配天道自然玄黄定位剖而爲二輕清覆地重濁承天輕清積氣化爲雲煙重濁積氣水出高源一氣化水坎卦生焉冬至上夏至上驚蟄上白露上清明中寒露中立夏中立冬中坎卦生於子謂陽氣始生之地也萬物方動萌芽漸滋天始布其陽氣人欲進其常道以此占人將欲昇新事始然坎爲天地之中運動如在半途星旺門順方可濟事二氣乃土與地相連水中陽聚土石城川陰陽接結坤卦神全雲煙之下土石之上陰精凝結陽昇而前小寒上小暑上立春下立秋下穀雨中霜降中小滿中小雪中坤卦在申極陰至柔先缺文繼母終始蔽翳動靜不缺文能行止不能止有謀不能見其終也三氣乃木發萌於地雷隱其中震卦當位大寒上大暑上春分上秋分上雨水下處暑上芒種中大雪中震卦生卯震厲成剛也震則動動則光耀漸進吹嘘之利時以益長變易更盛消息相因占人動謀而遇人又曰雷門凡事遇登門有驚尚未能入其室星旺門順凡事可成矣絜齊萬物巽卦四氣風行乎中電光發厲冬至下夏至下驚蟄下白露下清明上寒露上立夏上立冬上巽卦生巳謂四缺百川流溢皆歸之也大往小來則天地未交而萬物先通陰陽已交而卦氣未合始立者生榮已萌者不長占人有先後事達其始而塞其萌卦象寬江海尚歸之凡事當可折衷而兆百靈始立中央五氣天始覆缺文五氣絪緼人兹以始小寒下小暑下立春中立秋中穀雨上霜降上小滿上小雪上定章曰中央象空謂戊己之位土寄於坤母乗之也萬物得之而生理之而長山川定形則百靈始出天地之數五五謂二十五成大道而行鬼神也六氣健明剛柔得位萬物咸榮陰陽大利百脉纔通乾坤發麗大寒下大暑下春分下秋分下雨水中處暑中芒種上大雪上乾卦生亥陰氣極也故欲變化之道夬陰必退純陽初生小往大來之義金水交通直以大而生焉故乾其靜也專其動也健天傾於上日月歸之占人吉凶兆半猶豫循環之事遂則當有折闕金氣無依肅殺來至不覺凄然卦出于兊莫逃乎七天地驚煙冬至中夏至中驚蟄中白露中清明下寒露下立夏下立冬下兊卦生酉月門係焉夕陽虧折萬物老死行肅殺之令故謂天地賞善罰惡之地兊者說也占人當有口舌訟官不能明理陰謀者事當泄也又爲日月之門凡事阻滯而終艮止於八萬物潜殺火出于寅鑄鋾七金覆觀坎陷仰見离明小寒中小暑中立春上立秋上穀雨下霜降下小滿下小雪下艮卦生寅謂進退無常時止則止時行則行動靜不失其時艮者止止其所也占人進退不離其居建寅之月陽氣大申可進不可退當遂也火炎于上水潤其下動靜其中分乎晝夜夜陽九离顛倒變化大寒中大暑中春分中秋分中雨水上處暑上芒種下大雪下离卦生午陰氣生焉陽氣分位相干犯也剛處其外而能安居陰柔在外而不能定分大往小來明而既竭事將亡矣占人當有不正之義接氣超神依宫八卦剥拆盈虧乗除上下南北往來以成冬夏東西出没以分晝夜日月循環不至交差乾爲天兮萬物之父坤爲地兮萬物之母陰氣既衰巽爲長女經緯九虚總攝八土以齊七政歸於紫微維綱天地星日璇璣紐樞定坎斗柄朝离森羅萬象部天剛指月將晝夜分速遲黄赤并黑道永短從其魁森羅垂萬象環衛帝拱隨四極立大曜四時經緯推東方太陽帝君歲星天宫天蓬青春主之南方熒惑地水宫羅㬋天猷赤夏主之西方統運中界太陰后星鎭星太白計都月孛黑殺白秋主之北方辰星紫炁玄武黑冬主之二十八宿角亢氐房心尾箕斗牛女虚危室壁奎婁胃昴畢觜參井鬼柳星張翼軫虚外周圍三十六曜皇太清玄元文虚極由皓動翰素無釋變奕車昇崖定孝重思天曇碧珠華曜空堂瑞廣壽飛照臨日時諸星協贊五行四維主張氣運人物興衰調理陰陽永世可期雷霆風雨部太乙雷霆八卦所繫天沖破軍雷祖大帝運入乾宫是爲開天進入坤宫是爲闔地運入巽宫名曰風師運入坎宫名曰雨師運入艮宫名曰番山運入兊宫名曰覆水運入震宫名曰運入離宫名曰電會又有傷門直事雷神在乾霹靂在在离掣電在坎雨興在兊翦物在震伐人在坤並艮又推旺相陽使高飛休囚陰使勢緩低微變化節後遇陰陽明晦預合天機地氣上昇雲虚有篆生成之數河圖之先癸分十盡寅十三元子丑巳午甲申加己未青黄之氣存乎母育發泄於乾乙丁出震壬午齊肩丙辛戌亥兊澤之源卯酉日月之門艮爲樞户庚辰遊於离卦翼火星炎躔次黑道皎潔光圓又推天氣下降混元之宿南辰在治風雨司之次其二使風逆循支雨師順仲同隸而爲水風即發月火即霏金木即止日土微微木金虚靄金水雲低水火大作水月淋漓太陰一曜躔次黑道天施全機權衡入於雷府未會諸神非雨則晦月禽神會權衡入未只降昏迷若遇天星風水火二神歸四正猛風折木山嶽崩頽望晴陰降陽止陽降陰滅只以南辰宫制立見晴暉如乃相生同類又有臨交得母轉添雲翳黯黯空垂更忌太白熒惑又見青朱同位月纏黑道返起風雷風到太陰同酉風狂不弱雨到太陰同卯雨生暴雷轟雷震雨太陰纏於畢宿揚塵播土月曜度到箕星太陰離於畢宿風起天相若别箕宿雨出天機風乃陰陽盛氣天府天同風之絶地天梁天樞風之廣位天相天機司風雨吏日月之行亦經离坎中分二道唯黑主風出於九地隱見無蹤要玄之奥分於夏冬雷霆之府格有大小大格爲府小格爲宫入府主雨入宫主風天機在日正根尋源變遁而通三返晝夜水火交攻三要動靜直事伏吟論曰眞宗前後二辰先降其中自然之道不陰陽一判風雨數終九皇直符部陽遁一局丙辛日戊子時以甲申天沖爲直符加乙宫六戊天蓬時巍巍九皇直符九宫主張元氣變化無窮性各有常萬事克從天蓬子禽保固長乆水灾火盜莫大其凶利用安邊築城壘土遠行千里是以不中安營建寨却利天蓬春夏用之兵威雄雄婚殺公婦埋葬興隆秋冬之月收損主公修造不吉火焰燒空若占乆出千里迴蹤天内子成其符時干各天内時也崇上受道結交傳業却有和容若圖非事蠱怪瘟鍾行軍斬將人馬無功嫁娶起造宜向秋冬遷移不吉官盜交攻二百里灾春夏相逢行人歸矣雨水濛濛天沖子翹報冤伸恥行軍大勝却立奇功破圍攻敵覆怨堪通春夏商賈得利重重移徙亡女一年之中修造之者三載逢凶嫁者産死娶者困窮上官利武占取天沖天輔之星名號子卿設禮修教守道安身揚兵萬里威耀朔庭上官利武起造祥貞婚姻移徒春夏忻忻秋冬盜賊不可加臨營求商賈百事不成天禽居中祭祀求福戰征神助德號子公執仇討賊勦獲不空秋冬大利春夏多凶婚姻商賈埋葬尤隆上官大吉四季雍雍乾宫子襄治疾求靈將兵大勝星日天心求得遇至眞春夏不利秋冬嘉仁天柱子申隱形藏跡不利行軍人傷馬死車損其輪陰私謀匿無險有亨慶賀通逹戰鬥大勝星日天任嫁生貴子商賈財成可保安寧子房直時遠行作樂召和得就星日天英用兵戰鬥傷損軍人莫言移徙主火光生修營築室腰眼伸吟休囚從建悮觸灾深天數主之凡當敬欽八卦直事部八門直事逆順數分乾德乃開主司屬金舉事博戲大利遠征坎宫休水源事必清修造尚進取和治兵私謀稱欲友利行軍艮生山繼營謀事始不宜侵伐利謁貴人征戰敗北反受天刑震傷主之輔殺稱心討奸捕寇中道而擒吉行爲用自有灾迍巽神杜塞誅謬逃奔百不遂一道逢凶人离明之景上書啓陳又宜陣又宜巽兵吉行中道失物傷神坤維受死戮滅之刑不宜岀入疾病俱生如行吉事人鬭財爭兊梁驚門掩捕稱心破圍攻敵他危我存休囚逐節依卦而更逆則灾至迫則刑名日辰臨卦天乙之靈金化生水水流木榮木動火爀火炎土平土精金長上下相承如斯得吉几有通亨金動木折木動土萌土動水滅水動火塵火動金缺是謂逆行子首其父弟陳厥兄以水得水臣亢君情以水得土文書官刑以土得水才福競爭以木得金口舌來臨以金得火乖逆人情以火得水損符事相得若君若臣君若損臣杜絶賢人臣若賊君君臣慶會駕車登雲陰陽變化部太初混一陰陽相娱遂成孛格悔吝殊途格榮反枯青龍反首跌穴飛烏乾震杜死凶有吉無星門順旺宣握權殊白虎亡叛陷財龍走坤离覆之事當衰朽出師病生居者不久妄言朱雀憂盜螣蛇位分乾巽文書交加驚憂相疑披引其他事多不實虚名談誇二星相入天門艮維主之鬥爭事遲支遮事來金入姦主亡失皇又猶豫火入退也大刑飛伏禍亂兵必北舉身無涯寇讎相值不可離家官灾病至財破謀差天乙入白尊位灾至事從内起動則傷差若言戰鬥將必亡家太白入乙外靜灾疲門加太白離者復合太白入門合者將離出陣逢之軍將失威休咎存亡欲察人事格則格應隨格明之占事審庚歲月日時若值飛幹欣喜開眉若值伏格萬事得達歲爲父母月弟兄知日爲自己時屬妻兒或占亡失隨類知期時格時獲歲格歲追日格日得不格三奇符事犯熒煩惱吝亂門逆主失謀叛設譏日時孛格事當防危暗昧相通盜寇未持刑德聚集動靜從奇變化萬端陽符陽時更會吉門萬事可施符陰將弱百事不宜有奇無門内生艱阻有門無奇中路而迴返吟伏吟事主單疑天地之合居者須移不容須臾合者將離關隔缺亦遲遲知三避五力不至疲乾落陽宫艮巽速至天主日開時開通得吉闔塞逢危克應之法直使臨時不比取比天地交互于下而爲開人來也闔人不歸宫主失大事損身破財立見傷悲宫神德合前使可追犯之墓迫未免多疑三元九遁大得其時日月流精萬里楊輝悮事失望入墓三奇昏暘蔽翳是者返非五行不遇百事莫爲陰陽相殘遂成乖違六甲得使用之有威奇門犯迫虚事如雷更加奇墓謀者心灰九地之下大利潜伏九天之上安戰揚麾太陰六合私謀發機勾神之宫理訟堪依犯之墓迫成者將危六甲宴爾怡嬉會朋召將各各忻嬉驚門在上鬥打相持玉女守户習雪妍嬉陰私如意文書光輝執怨申恥天輔時居扶持忠良去削邪非斧鉞在頸天神祐之訟逃失獄占網而推坎坤震巽訟入逃迴乾兊艮离訟出逃追五音姓數商金宫土徵火羽水角音木雷陰陽職戰炁高低陽時得利高鼓張旗爲者勝以炁陽威陰時戰鬥銜枚不嘶以靜客勝乃合天機天干定位下臨次支一干一支各有其宜天玄遁地開闔主之人與飛甲周遊八表不落陰位大利誅夷存亡定矣悔吝無違制伏神鬼部返閉之法旋斗歷箕先天後地風雨不移上應九星下接九域幽冥之中此說洞知天剛豁落萬法總持洞依剛斗呪切勿四時任意施爲避病神鬼戰鬥被圍制伏邪昧覆斗沖關而宣呪詩斗要妙兮十二神步天罡兮髣髴兮浮青雲七變動兮登陽明知變化兮有吉凶歷斗兮天關合律令兮將甲乙履天英兮乗天任抱天柱兮遶天心以此度兮登天禽倚天輔兮躡天沖入天内兮出天蓬斗道通兮剛柔濟天福禄兮留萬世清泠泉兮何陸沉入杳冥兮千萬歲豁落神兮除百穢千鬼萬神皆自斃埋頭向地無動無作急急如北斗九皇帝星君律令巍巍洪範太丹玉笈禁書非中下界所聞之法文雖口受訣在天傳蕪穢眞文不登仙品妄傳混俗罪積非常輕易泄機禍連九族非得志人祕之宜也玄精碧匣靈寳聚玄經卷上
